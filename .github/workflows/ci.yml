name: Crear y subir la imagen Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Crear imagen Docker
        run: |
          docker build -t christianescalas/backend-escuela:latest .

      - name: Subir imagen Docker
        run: |
          docker push christianescalas/backend-escuela:latest

      - name: despliegue en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull christianescalas/backend-escuela:latest
            docker stop escuela_api || true
            docker rm escuela_api || true
            docker run -d -p 5000:5000 --name escuela_api christianescalas/backend-escuela:latest
